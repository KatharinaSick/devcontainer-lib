server:
  # Use server auth mode for easy access in devcontainer environments
  extraArgs:
    - --auth-mode=server
  service:
    type: NodePort
    nodePort: 30111
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 200m

controller:
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 200m
