server:
  # Use server auth mode for easy access in devcontainer environments
  extraArgs:
    - --auth-mode=server
  serviceType: NodePort
  serviceNodePort: 30111
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 200m

controller:
  extraEnv:
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: "http://collector.otel.svc.cluster.local:4317"
    - name: OTEL_SERVICE_NAME
      value: "argo-workflows"
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 200m
