name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the latest tag, default to v0.0.0 if none exists yet
          latest=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          major=$(echo "${latest#v}" | cut -d. -f1)
          minor=$(echo "${latest#v}" | cut -d. -f2)
          patch=$(echo "${latest#v}" | cut -d. -f3)

          # Determine version bump from the commit message (Conventional Commits):
          # breaking change (! or BREAKING CHANGE) → major, feat → minor, everything else → patch
          msg=$(git log -1 --pretty=%s)
          if echo "$msg" | grep -qE "^[a-z]+(\(.+\))?!:|BREAKING CHANGE"; then
            major=$((major + 1)); minor=0; patch=0
          elif echo "$msg" | grep -qE "^feat(\(.+\))?:"; then
            minor=$((minor + 1)); patch=0
          else
            patch=$((patch + 1))
          fi

          # Create a GitHub release — this also creates the tag, which makes the
          # tarball available at /archive/refs/tags/<tag>.tar.gz
          new_tag="v${major}.${minor}.${patch}"
          gh release create "$new_tag" --generate-notes --title "$new_tag"
