gitea:
  admin:
    username: gitea
    password: gitea
    email: gitea@local
  config:
    database:
      DB_TYPE: sqlite3

service:
  http:
    type: NodePort
    nodePort: 30110

# Disable persistence and use SQLite to keep the setup lightweight
persistence:
  enabled: false

postgresql-ha:
  enabled: false

postgresql:
  enabled: false

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m
