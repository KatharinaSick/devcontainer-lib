server:
  # Use server auth mode for easy access in devcontainer environments
  extraArgs:
    - --auth-mode=server
  service:
    type: NodePort
    nodePort: 30111
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 200m

controller:
  extraEnv:
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: "http://otel-collector.otel-collector.svc.cluster.local:4317"
    - name: OTEL_SERVICE_NAME
      value: "argo-workflows"
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 200m
